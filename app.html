<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL — YouTube AI 视频解读</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
:root {
  --bg: #ffffff; --bg-alt: #fafafa; --bg-card: #ffffff;
  --bg-hover: #f5f5f5;
  --border: #ddd; --border-hover: #bbb;
  --text: #1e1e1e; --text-dim: #6a737d; --text-muted: #959da5;
  --accent: #6f42c1; --accent-dim: rgba(111,66,193,0.08);
  --keyword: #d73a49; --string: #22863a; --func: #005cc5;
  --type: #e36209; --comment: #6a737d; --const: #6f42c1;
  --pixel: 'Press Start 2P', monospace;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
  --sans: 'Space Grotesk', -apple-system, 'PingFang SC', sans-serif;
}
body {
  font-family: var(--sans); color: var(--text); background: var(--bg-alt);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
::selection { background: var(--accent); color: #fff; }

/* ===== Nav ===== */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
  border-bottom: 2px dotted var(--border); height: 56px;
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; max-width: 900px; margin: 0 auto; padding: 0 24px;
}
.nav-left { display: flex; align-items: center; gap: 28px; }
.nav-logo {
  font-family: var(--pixel); font-size: 11px; font-weight: 400;
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo .dot { width: 8px; height: 8px; background: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 14px; }
/* ===== Layout ===== */
.main { max-width: 900px; margin: 0 auto; padding: 76px 24px 60px; }

/* ===== Header ===== */
.page-header { margin-bottom: 28px; }
.page-header h1 {
  font-family: var(--sans); font-size: 22px; font-weight: 700;
  margin-bottom: 6px; letter-spacing: -0.3px;
}
.page-header p { font-family: var(--mono); font-size: 12px; color: var(--text-dim); line-height: 1.6; }

/* ===== Tabs ===== */
.tabs {
  display: flex; gap: 6px; margin-bottom: 24px;
  overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px;
}
.tab {
  padding: 7px 14px; border-radius: 0;
  font-family: var(--pixel); font-size: 8px; font-weight: 400;
  cursor: pointer; transition: all 0.15s;
  border: 2px dotted var(--border); background: transparent; color: var(--text-dim);
  white-space: nowrap; flex-shrink: 0; letter-spacing: 0.3px;
}
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); border-style: solid; }

/* ===== Video Cards ===== */
.feed { display: flex; flex-direction: column; gap: 16px; }
.card {
  background: var(--bg-card); border-radius: 2px; padding: 24px;
  border: 2px dotted var(--border); transition: all 0.2s; cursor: pointer;
  position: relative;
}
.card:hover { border-color: var(--accent); background: var(--bg-hover); }
.card.hidden { display: none; }
.card-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.card-cat {
  font-family: var(--pixel); font-size: 7px; font-weight: 400; padding: 3px 8px;
  border-radius: 0; letter-spacing: 0.5px; text-transform: uppercase;
}
.cat-interview { background: rgba(215,58,73,0.07); color: #d73a49; border: 1px solid #d73a49; }
.cat-keynote { background: rgba(0,92,197,0.07); color: #005cc5; border: 1px solid #005cc5; }
.cat-debate { background: rgba(227,98,9,0.07); color: #e36209; border: 1px solid #e36209; }
.cat-tech { background: rgba(34,134,58,0.07); color: #22863a; border: 1px solid #22863a; }
.card-channel {
  font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600;
}
.card-dot { color: var(--text-muted); font-size: 10px; }
.card-duration {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  background: var(--bg-alt); padding: 2px 8px; border: 1px dotted var(--border);
}
.card-date { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.card h3 {
  font-size: 17px; font-weight: 700; line-height: 1.5; margin-bottom: 8px;
  letter-spacing: -0.2px; color: var(--text);
}
.card .card-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.7; margin-bottom: 12px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.card-tag {
  font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 0;
  background: var(--bg-alt); color: var(--text-dim); border: 1px dotted var(--border);
  letter-spacing: 0.3px;
}
.card-yt {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--mono); font-size: 10px; color: var(--text-muted);
  margin-top: 12px; padding-top: 12px; border-top: 1px dotted var(--border);
}
.card-yt .yt-icon { color: #d73a49; font-size: 12px; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: var(--bg-card); color: var(--text); padding: 10px 20px; border-radius: 2px;
  font-family: var(--mono); font-size: 12px; font-weight: 600; z-index: 1000;
  transition: transform 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  border: 2px dotted var(--border);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .user-name { display: none; }
  .card h3 { font-size: 15px; }
  .main { padding: 68px 16px 40px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== Nav ===== -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-left">
      <a href="product-preview.html" class="nav-logo"><span class="dot"></span>SIGNAL</a>
    </div>
    <div class="nav-right">
      <a href="product-preview.html" style="font-family:var(--mono);font-size:12px;color:var(--text-dim);border:2px dotted var(--border);padding:6px 14px;transition:all 0.15s;">← 首页</a>
    </div>
  </div>
</nav>

<!-- ===== Main ===== -->
<div class="main">
  <div class="page-header">
    <h1 id="greetingText">早上好</h1>
    <p>YouTube 上最值得看的 AI 内容，我们帮你看完、翻译、解读。</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-cat="all" onclick="filterCards(this)">全部</button>
    <button class="tab" data-cat="interview" onclick="filterCards(this)">深度访谈</button>
    <button class="tab" data-cat="keynote" onclick="filterCards(this)">大会演讲</button>
    <button class="tab" data-cat="debate" onclick="filterCards(this)">圆桌激辩</button>
    <button class="tab" data-cat="tech" onclick="filterCards(this)">技术解析</button>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed">
  </div>
</div>

<script>
// Greeting
{
  const h = new Date().getHours();
  let g = '早上好'; if (h >= 12 && h < 18) g = '下午好'; else if (h >= 18) g = '晚上好';
  const greetEl = document.getElementById('greetingText');
  if (greetEl) greetEl.textContent = g;
}

// Category mapping
const CAT_MAP = {
  interview: { cls: 'cat-interview', label: '深度访谈' },
  keynote:   { cls: 'cat-keynote',   label: '大会演讲' },
  debate:    { cls: 'cat-debate',    label: '圆桌激辩' },
  tech:      { cls: 'cat-tech',      label: '技术解析' }
};

// Build card HTML from article object
function buildCard(a) {
  const cat = CAT_MAP[a.category] || { cls: '', label: a.category };
  const tagsHTML = (a.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('\n        ');
  return `<div class="card" data-category="${a.category}" data-id="${a.id}" onclick="openArticle(this)">
      <div class="card-top">
        <span class="card-cat ${cat.cls}">${cat.label}</span>
        <span class="card-channel">${a.source}</span>
        <span class="card-dot">/</span>
        <span class="card-date">${a.date}</span>
      </div>
      <h3 class="card-title">${a.title}</h3>
      <p class="card-summary">${(a.summary || '').substring(0, 120)}…</p>
      <div class="card-tags">
        ${tagsHTML}
      </div>
    </div>`;
}

// Fetch articles and render
fetch('articles/index.json')
  .then(res => res.json())
  .then(articles => {
    const feed = document.getElementById('feed');
    feed.innerHTML = articles.map(buildCard).join('\n');
  })
  .catch(err => console.error('Failed to load articles:', err));

// Filter
function filterCards(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const cat = el.dataset.cat;
  document.querySelectorAll('.feed > .card').forEach(card => {
    if (cat === 'all' || (card.dataset.category && card.dataset.category.includes(cat))) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}


// Open article
function openArticle(el) {
  const id = el.dataset.id;
  if (id) window.open('article.html?id=' + id, '_blank');
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 2000);
}
</script>
</body>
</html>
